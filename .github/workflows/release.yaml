on:
  push:
    tags: ['v*']

name: release.yaml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from NEWS.md
        id: notes
        run: |
          # Extract the section for this version from NEWS.md
          awk '/^# immReferent ${{ steps.version.outputs.version }}/{found=1; next} /^# immReferent /{if(found) exit} found' NEWS.md > release_notes.md
          echo "Release notes extracted:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: immReferent ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
